<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Prisha</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="./cause.css">
</head>
<body>
    <div class="custom-cursor">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#ff4f9a" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
    </div>

    <main class="container">
        <p class="page-kicker">A few reasons before 15 May arrives</p>
        <h1>Prisha, You Make Everything Sweeter</h1>

        <div class="portrait-strip" aria-label="Prisha photo highlights">
            <img src="d1.jpeg" alt="Prisha birthday portrait">
            <img src="d2.jpeg" alt="Prisha happy moment">
            <img src="d3.jpeg" alt="Prisha special memory">
        </div>

        <section id="reasons-container" aria-live="polite"></section>

        <button class="shuffle-button" type="button">Show One More</button>
        <div class="reason-counter"></div>

        <section class="ending-section">
            <div class="ending-photo">
                <img src="d1.jpeg" alt="Prisha">
            </div>
            <div class="ending-text">My favorite person, my Prisha</div>
        </section>
    </main>

    <script src="cause.js"></script>
</body>
</html>
